<style>
  /* Post body typography — reuses case-file.css tokens */
  #post-content{max-width:760px;margin:0 auto;padding:56px 5vw 100px;}
  #post-content .post-date{
    font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:var(--rust);
    letter-spacing:0.06em;text-transform:uppercase;
  }
  #post-content h1{font-family:'Special Elite',monospace;font-size:clamp(1.8rem,5vw,2.5rem);color:var(--paper);line-height:1.2;}
  #post-content .tags{display:flex;gap:6px;flex-wrap:wrap;}
  #post-content .tag{
    font-family:'IBM Plex Mono',monospace;font-size:0.68rem;
    background:var(--bg-alt);border:1px solid var(--panel-line);
    padding:3px 9px;border-radius:2px;color:var(--text);
  }
  .post-body{color:var(--text);font-size:1rem;line-height:1.75;}
  .post-body h2{font-family:'IBM Plex Mono',monospace;font-size:1.15rem;color:var(--paper);text-transform:uppercase;letter-spacing:0.03em;margin-top:40px;}
  .post-body h3{font-family:'IBM Plex Mono',monospace;font-size:1rem;color:var(--paper);margin-top:32px;}
  .post-body p{margin:0 0 18px;}
  .post-body a{color:var(--brass);}
  .post-body img{max-width:100%;border-radius:4px;border:1px solid var(--panel-line);margin:18px 0;}
  .post-body ul,.post-body ol{margin:0 0 18px;padding-left:22px;}
  .post-body li{margin-bottom:6px;}
  .post-body blockquote{
    border-left:3px solid var(--brass);margin:20px 0;padding:4px 18px;
    color:var(--muted);font-style:italic;
  }
  .post-body code{
    font-family:'IBM Plex Mono',monospace;background:var(--bg-alt);
    padding:2px 6px;border-radius:3px;font-size:0.88em;
  }
  .post-body pre{
    background:#0d0f14;border:1px solid var(--panel-line);border-radius:4px;
    padding:18px 20px;overflow-x:auto;margin:18px 0;
  }
  .post-body pre code{background:transparent;padding:0;}
  .back-link{
    display:inline-block;margin-bottom:0;
    font-family:'IBM Plex Mono',monospace;font-size:0.78rem;color:var(--muted);
    text-decoration:none;border-bottom:1px dotted var(--muted);
  }
  .back-link:hover{color:var(--brass);border-color:var(--brass);}
</style>
</head>
