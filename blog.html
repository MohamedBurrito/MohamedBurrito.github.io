<link rel="stylesheet" href="assets/style.css">
<style>
  /* ---------- Blog post cards (reuses the site's paper "file" look, simplified) ---------- */
  .posts{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:22px;}
  .post{
    background:var(--bg-alt);
    border:1px solid var(--panel-line);
    border-left:3px solid var(--brass);
    padding:22px;border-radius:3px;
  }
  .post .post-date{font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--rust);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;display:block;}
  .post h3{font-family:'Special Elite',monospace;font-size:1.1rem;margin:0 0 8px;color:var(--paper);}
  .post p{font-size:0.9rem;color:var(--text);margin:0;}
  .post a{text-decoration:none;}
  .post a:hover h3{color:var(--brass);}

  .empty-state{
    border:1px dashed var(--panel-line);
    border-radius:4px;
    padding:40px 24px;
    text-align:center;
    color:var(--muted);
    font-family:'IBM Plex Mono',monospace;
    font-size:0.85rem;
  }
  .empty-state strong{color:var(--text);display:block;font-family:'Special Elite',monospace;font-size:1.05rem;margin-bottom:8px;}
</style>
</head>
